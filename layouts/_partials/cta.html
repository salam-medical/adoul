<section class="cta-band reveal">
  <div class="cta-bg" style="background-image:url('{{ "img/skyline.jpg" | relURL }}')"></div>
  <div class="cta-content">
    <h2>{{ i18n "contactCtaTitle" }}</h2>
    <p>{{ i18n "contactCta" }}</p>
    {{ with index (where site.RegularPages "Params.translationKey" "contact") 0 }}<a class="btn btn-light" href="{{ .RelPermalink }}">{{ i18n "getInTouch" }}</a>{{ end }}
  </div>
</section>
