<header class="site-header" id="site-header">
  <div class="header-inner">
    <a class="brand" href="{{ "/" | relLangURL }}" aria-label="alma:s Architekten">
      <img src="{{ "img/logo.png" | relURL }}" alt="alma:s Architekten" class="brand-logo">
    </a>
    <nav class="site-nav" id="site-nav" aria-label="Main">
      <ul>
        {{ $currentPage := . }}
        {{ range site.Menus.main }}
        <li><a href="{{ .URL }}" {{ if or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }}class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
      <div class="lang-switch" role="navigation" aria-label="Language">
        <span class="lang-current">{{ site.Language.LanguageName }}</span>
        {{ range .Translations }}
        <a href="{{ .RelPermalink }}" hreflang="{{ .Language.LanguageCode }}">{{ .Language.LanguageName }}</a>
        {{ end }}
      </div>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
